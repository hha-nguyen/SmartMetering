apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  labels:
    app: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: smartmetering-payments:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # Stripe keys đọc từ k8s Secret 'stripe' (không hardcode)
            - name: Stripe__SecretKey
              valueFrom:
                secretKeyRef:
                  name: stripe
                  key: secret-key
            - name: Stripe__WebhookSecret
              valueFrom:
                secretKeyRef:
                  name: stripe
                  key: webhook-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payments
spec:
  selector:
    app: payments
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
