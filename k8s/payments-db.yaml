apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-db
  labels:
    app: payments-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-db
  template:
    metadata:
      labels:
        app: payments-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "payments"
            - name: POSTGRES_PASSWORD
              value: "payments"
            - name: POSTGRES_DB
              value: "payments"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payments-db
spec:
  selector:
    app: payments-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
