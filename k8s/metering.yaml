apiVersion: apps/v1
kind: Deployment
metadata:
  name: metering
  labels:
    app: metering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metering
  template:
    metadata:
      labels:
        app: metering
    spec:
      containers:
        - name: metering
          image: smartmetering-metering:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: metering
spec:
  selector:
    app: metering
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
